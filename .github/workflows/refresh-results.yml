name: refresh-results

# Runs the eval suite, regenerates site/public/data/rollup.json, and
# commits the update. Vercel picks up the commit and redeploys the site.
#
# Triggered either manually (Actions tab → Run workflow) or weekly at
# Sunday 08:00 UTC. Requires the repo secret ANTHROPIC_API_KEY.

on:
  workflow_dispatch:
    inputs:
      models:
        description: "Comma-separated subject models (inspect-ai specs). Defaults run anthropic + openai if both keys are set."
        default: ""
        required: false
      limit:
        description: "Per-eval sample cap; leave blank to run the full suite"
        default: ""
        required: false
  schedule:
    - cron: "0 8 * * 0"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    # secrets context isn't available in job-level if; bind to env first.
    env:
      HAS_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
      HAS_OPENAI_KEY: ${{ secrets.OPENAI_API_KEY != '' }}
    steps:
      # Fail loudly if no provider keys are set rather than letting every
      # subsequent step skip silently with a green checkmark — a missing
      # secret previously looked indistinguishable from a passing run.
      - name: Require at least one provider key
        run: |
          if [ "$HAS_ANTHROPIC_KEY" != "true" ] && [ "$HAS_OPENAI_KEY" != "true" ]; then
            echo "::error::No provider key configured. Set ANTHROPIC_API_KEY or OPENAI_API_KEY as a repo secret."
            exit 1
          fi
          echo "anthropic=$HAS_ANTHROPIC_KEY openai=$HAS_OPENAI_KEY"
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install 3.11 && uv sync --all-extras
      - name: Run each eval against each available provider
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p logs
          LIMIT="${{ inputs.limit }}"
          LIMIT_FLAG=""
          if [ -n "$LIMIT" ]; then LIMIT_FLAG="--limit $LIMIT"; fi

          # Build the model list. Manual override beats auto-selection.
          MODELS_INPUT="${{ inputs.models }}"
          if [ -n "$MODELS_INPUT" ]; then
            IFS=',' read -ra MODELS <<< "$MODELS_INPUT"
          else
            MODELS=("anthropic/claude-sonnet-4-6")
            if [ "$HAS_OPENAI_KEY" = "true" ]; then
              MODELS+=("openai/gpt-4o")
            fi
          fi

          echo "Running models: ${MODELS[*]}"
          for MODEL in "${MODELS[@]}"; do
            for eval_dir in evals/*/; do
              name="$(basename "$eval_dir")"
              if [ "$name" = "_template" ]; then continue; fi
              echo "::group::$MODEL · $name"
              uv run inspect eval "$eval_dir/eval.py" \
                --model "$MODEL" \
                $LIMIT_FLAG \
                --log-dir logs/ \
                || echo "::warning::$MODEL · $name failed; continuing"
              echo "::endgroup::"
            done

            # External baselines from inspect_evals — comparison axis
            # only, capped at 50 samples regardless of LIMIT to keep
            # cost bounded. The site renders these as context, not as
            # a leaderboard reproduction.
            BASELINE_LIMIT=50
            if [ -n "$LIMIT" ] && [ "$LIMIT" -lt "$BASELINE_LIMIT" ]; then
              BASELINE_LIMIT="$LIMIT"
            fi
            for BASELINE in inspect_evals/truthfulqa inspect_evals/simpleqa; do
              echo "::group::$MODEL · $BASELINE (limit $BASELINE_LIMIT)"
              uv run inspect eval "$BASELINE" \
                --model "$MODEL" \
                --limit "$BASELINE_LIMIT" \
                --log-dir logs/ \
                || echo "::warning::$MODEL · $BASELINE failed; continuing"
              echo "::endgroup::"
            done
          done
      - name: Regenerate rollup.json
        run: |
          mkdir -p site/public/data
          uv run python analysis/rollup.py logs/ \
            --format json \
            -o site/public/data/rollup.json
      - name: Commit if changed
        run: |
          if git diff --quiet -- site/public/data/rollup.json; then
            echo "No changes to rollup.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/public/data/rollup.json
          git commit -m "refresh: update rollup.json from eval run"
          git push
