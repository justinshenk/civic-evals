name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install Python + deps
        run: |
          uv python install 3.11
          uv sync --all-extras
      - name: Ruff
        run: uv run ruff check .
      - name: Schema + module-load tests
        run: uv run pytest -q

  smoke-run:
    runs-on: ubuntu-latest
    needs: lint-and-schema
    # The `secrets` context is not available in job-level `if`. Map to env
    # at job level, then guard each step on env.HAS_ANTHROPIC_KEY.
    env:
      HAS_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    strategy:
      fail-fast: false
      matrix:
        eval:
          - voting_access
          - election_integrity
          - policy_impact_personalization
          - fermi_civic_estimation
    steps:
      - if: env.HAS_ANTHROPIC_KEY == 'true'
        uses: actions/checkout@v4
      - if: env.HAS_ANTHROPIC_KEY == 'true'
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - if: env.HAS_ANTHROPIC_KEY == 'true'
        run: uv python install 3.11 && uv sync --all-extras
      - name: Smoke-run ${{ matrix.eval }} (1 sample, Haiku)
        if: env.HAS_ANTHROPIC_KEY == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          uv run inspect eval evals/${{ matrix.eval }}/eval.py \
            --model anthropic/claude-haiku-4-5 \
            --limit 1 \
            --log-dir logs/
