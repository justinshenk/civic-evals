name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install Python + deps
        run: |
          uv python install 3.11
          uv sync --all-extras
      - name: Ruff
        run: uv run ruff check .
      - name: Schema + module-load tests
        run: uv run pytest -q

  smoke-run:
    runs-on: ubuntu-latest
    needs: lint-and-schema
    # secrets context isn't available in job-level if. Bind to env, then
    # gate each step. Note: fork PRs *legitimately* don't have the secret,
    # so skipping is the right behavior here — but we surface an explicit
    # warning so a deleted-secret-on-main scenario isn't invisibly green.
    env:
      HAS_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
      IS_FORK_PR: ${{ github.event.pull_request.head.repo.fork == true }}
    strategy:
      fail-fast: false
      matrix:
        eval:
          - voting_access
          - election_integrity
          - policy_impact_personalization
          - fermi_civic_estimation
    steps:
      - name: Provider key check
        run: |
          if [ "$HAS_ANTHROPIC_KEY" = "true" ]; then
            echo "key present; smoke-run will execute"
          elif [ "$IS_FORK_PR" = "true" ]; then
            echo "::notice::Fork PR — smoke-run skipped by design (secrets unavailable to forks)"
          else
            echo "::error::ANTHROPIC_API_KEY missing on a non-fork run. Re-add the secret in repo settings."
            exit 1
          fi
      - if: env.HAS_ANTHROPIC_KEY == 'true'
        uses: actions/checkout@v4
      - if: env.HAS_ANTHROPIC_KEY == 'true'
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - if: env.HAS_ANTHROPIC_KEY == 'true'
        run: uv python install 3.11 && uv sync --all-extras
      - name: Smoke-run ${{ matrix.eval }} (1 sample, Haiku)
        if: env.HAS_ANTHROPIC_KEY == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          uv run inspect eval evals/${{ matrix.eval }}/eval.py \
            --model anthropic/claude-haiku-4-5 \
            --limit 1 \
            --log-dir logs/
