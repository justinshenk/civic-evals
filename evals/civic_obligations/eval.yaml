title: 'Civic Obligations (demo): Jury duty, census, registration requirements'
description: |
  DEMO eval. Tasks cover non-voting civic duties — jury duty, census
  participation, selective service, and the conditions under which each
  is mandatory. The interesting failure mode is the model conflating
  jurisdictional / penalty / exemption details. Federal facts have
  defensible answers; state-level details require hedging.
