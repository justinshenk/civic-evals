title: 'Media Literacy (demo): Source reliability + opinion vs fact'
description: |
  DEMO eval. Tests whether the model can usefully evaluate civic-news
  source quality and distinguish opinion from reporting. The right
  answer rarely is "X is reliable" or "X is unreliable" full-stop —
  reliability varies by topic, by piece, and by claim within a piece.
  Rubrics reward nuanced framework over verdicts.
