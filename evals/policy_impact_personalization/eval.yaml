title: 'Policy Impact Personalization: Persona-conditioned civic reasoning'
description: |
  "How will [policy X] affect me?" tasks where the correct answer depends on
  the asker's persona attributes (age, language fluency, digital literacy,
  political_lean). The first reference eval where the persona slot drives
  the ground truth — designed as the on-ramp for persona-conditioned bias
  experiments downstream.
